// Derive summary from tasks (source of truth)
(function() {
  const tasks = DATA.tasks;
  const done = tasks.filter(t => t.status === 'Done');
  const open = tasks.filter(t => t.status !== 'Done');
  const overdue = tasks.filter(t => t.is_overdue);
  const inProgress = tasks.filter(t => t.status === 'In Progress');
  const approval = tasks.filter(t => t.status === 'Approval & Invoice');
  const todo = tasks.filter(t => t.status === 'To Do');

  const avgResolution = done.length > 0
    ? Math.round(done.reduce((s, t) => s + t.days_open, 0) / done.length)
    : null;
  const maxTime = Math.max(...tasks.map(t => t.days_open));
  const approvalWaitTotal = approval.reduce((s, t) => s + t.time_in_current_status, 0);
  const approvalWaitAvg = approval.length > 0 ? Math.round(approvalWaitTotal / approval.length) : 0;

  DATA.summary = {
    total: tasks.length,
    open: open.length,
    done: done.length,
    overdue: overdue.length,
    in_progress: inProgress.length,
    approval_invoice: approval.length,
    todo: todo.length,
    max_time_taken_days: maxTime,
    avg_resolution_days: avgResolution,
    avg_approval_wait_days: approvalWaitAvg,
    total_approval_wait_days: approvalWaitTotal
  };
})();
