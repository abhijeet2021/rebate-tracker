// Derive summary from tasks (source of truth)
(function() {
  const tasks = DATA.tasks;
  const done = tasks.filter(t => t.status === 'Done');
  const open = tasks.filter(t => t.status !== 'Done');
  const overdue = tasks.filter(t => t.is_overdue);
  const inProgress = tasks.filter(t => t.status === 'In Progress');
  const approval = tasks.filter(t => t.status === 'Approval & Invoice');
  const todo = tasks.filter(t => t.status === 'To Do');

  const avgResolution = done.length > 0
    ? Math.round(done.reduce((s, t) => s + t.days_open, 0) / done.length)
    : null;
  const maxTime = Math.max(...tasks.map(t => t.days_open));
  const approvalWaitTotal = approval.reduce((s, t) => s + t.time_in_current_status, 0);
  const approvalWaitAvg = approval.length > 0 ? Math.round(approvalWaitTotal / approval.length) : 0;

  DATA.summary = {
    total: tasks.length,
    open: open.length,
    done: done.length,
    overdue: overdue.length,
    in_progress: inProgress.length,
    approval_invoice: approval.length,
    todo: todo.length,
    max_time_taken_days: maxTime,
    avg_resolution_days: avgResolution,
    avg_approval_wait_days: approvalWaitAvg,
    total_approval_wait_days: approvalWaitTotal
  };
})();

<script>
  // Main render — called after DATA is defined
  document.addEventListener('DOMContentLoaded', () => renderDashboard());
  function renderDashboard() {
    const app = document.getElementById('app');
    app.innerHTML = '';
    app.appendChild(renderHeader());
    app.appendChild(renderKPIStrip());
    app.appendChild(renderProductivitySection());
    app.appendChild(renderStatusAndOverdueSection());
  }

  function renderProductivitySection() {
    const s = DATA.summary;
    const showReco = s.avg_approval_wait_days > 5;
    const completedPct = Math.round((s.done / s.total) * 100);
    const approvalPct = Math.round((s.approval_invoice / s.total) * 100);
    const openOtherPct = 100 - completedPct - approvalPct;

    const el = document.createElement('div');
    el.className = 'bg-white rounded-xl border border-gray-200 p-6 space-y-4';
    el.innerHTML = `
      <div>
        <h2 class="text-base font-semibold text-gray-900">Productivity vs. Approval Lag</h2>
        <p class="text-xs text-gray-500 mt-0.5">Work completed vs. time consumed waiting for approvals</p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="rounded-xl border border-green-200 bg-green-50 p-5 flex flex-col gap-1">
          <span class="text-xs font-medium text-green-700 uppercase tracking-wide">Tasks Completed</span>
          <span class="text-4xl font-bold text-green-700">${s.done}</span>
          <span class="text-xs text-green-600">tasks closed out</span>
        </div>
        <div class="rounded-xl border border-amber-200 bg-amber-50 p-5 flex flex-col gap-1">
          <span class="text-xs font-medium text-amber-700 uppercase tracking-wide">Days Waiting for Approvals</span>
          <span class="text-4xl font-bold text-amber-700">${s.total_approval_wait_days}</span>
          <span class="text-xs text-amber-600">across ${s.approval_invoice} tasks · avg ${s.avg_approval_wait_days}d each</span>
        </div>
      </div>
      <div>
        <p class="text-xs text-gray-500 mb-2">Share of total tasks</p>
        <div class="flex rounded-full overflow-hidden h-4">
          <div class="bg-green-500" style="width:${completedPct}%" title="Completed ${completedPct}%"></div>
          <div class="bg-amber-400" style="width:${approvalPct}%" title="Approval & Invoice ${approvalPct}%"></div>
          <div class="bg-blue-400" style="width:${openOtherPct}%" title="Other open ${openOtherPct}%"></div>
        </div>
        <div class="flex gap-4 mt-2 text-xs text-gray-500">
          <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-green-500"></span> Completed ${completedPct}%</span>
          <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-amber-400"></span> Approval &amp; Invoice ${approvalPct}%</span>
          <span class="flex items-center gap-1"><span class="inline-block w-3 h-3 rounded-full bg-blue-400"></span> Other Open ${openOtherPct}%</span>
        </div>
      </div>
      <p class="text-sm text-gray-600 bg-gray-50 rounded-lg px-4 py-3 border border-gray-200">
        <strong>${s.done}</strong> tasks completed &middot;
        <strong>${s.total_approval_wait_days}</strong> total days accumulated waiting for approvals across
        <strong>${s.approval_invoice}</strong> current tasks &middot;
        avg <strong>${s.avg_approval_wait_days} days</strong> per approval task
      </p>
      ${showReco ? `<div class="reco-panel">&#128161; <strong>Potential efficiency gain:</strong> Approval stage is experiencing higher processing time than earlier stages. Introducing batch approvals or automation may improve throughput.</div>` : ''}
    `;
    return el;
  }

  function getStatusCounts() {
    const counts = { 'To Do': 0, 'In Progress': 0, 'Approval & Invoice': 0, 'Done': 0 };
    DATA.tasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
    return counts;
  }

  function getStatusAvgAge() {
    const groups = {};
    DATA.tasks.forEach(t => {
      if (!groups[t.status]) groups[t.status] = [];
      groups[t.status].push(t.days_open);
    });
    const result = {};
    for (const [s, ages] of Object.entries(groups)) {
      result[s] = Math.round(ages.reduce((a, b) => a + b, 0) / ages.length);
    }
    return result;
  }

  function statusPillClass(status) {
    const map = { 'To Do': 'pill-todo', 'In Progress': 'pill-inprogress', 'Approval & Invoice': 'pill-approval', 'Done': 'pill-done' };
    return map[status] || 'pill-todo';
  }

  function renderStatusAndOverdueSection() {
    const counts = getStatusCounts();
    const avgAge = getStatusAvgAge();
    const total = DATA.summary.total;

    const statusColors = {
      'To Do': '#9CA3AF', 'In Progress': '#2563EB',
      'Approval & Invoice': '#D97706', 'Done': '#059669'
    };

    const el = document.createElement('div');
    el.className = 'grid grid-cols-1 md:grid-cols-3 gap-6';

    // Left: status distribution (2/3 width)
    const leftEl = document.createElement('div');
    leftEl.className = 'md:col-span-2 bg-white rounded-xl border border-gray-200 p-6 space-y-4';
    leftEl.innerHTML = `
      <h2 class="text-base font-semibold text-gray-900">Status Distribution</h2>
      <div class="flex flex-col md:flex-row gap-6 items-center">
        <div class="w-48 h-48 flex-shrink-0">
          <canvas id="donutChart"></canvas>
        </div>
        <div class="flex-1 space-y-3 w-full">
          ${Object.entries(counts).map(([status, count]) => {
            const pct = Math.round((count / total) * 100);
            const avg = avgAge[status] || 0;
            const maxAge = Math.max(...(DATA.tasks.filter(t => t.status === status).map(t => t.days_open).concat([0])));
            return `
            <div>
              <div class="flex justify-between items-center mb-1">
                <span class="status-pill ${statusPillClass(status)}">${status}</span>
                <span class="text-sm font-semibold text-gray-700">${count} <span class="text-gray-400 font-normal">(${pct}%)</span></span>
              </div>
              <div class="h-2 bg-gray-100 rounded-full overflow-hidden">
                <div class="h-full rounded-full" style="width:${pct}%;background:${statusColors[status]}"></div>
              </div>
              <div class="flex gap-4 mt-1 text-xs text-gray-400">
                <span>Avg age: ${avg}d</span>
                <span>Max age: ${maxAge}d</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;

    // Right: overdue panel placeholder (replaced in Task 8)
    const rightEl = document.createElement('div');
    rightEl.id = 'overdue-panel-slot';
    rightEl.className = 'md:col-span-1 bg-white rounded-xl border border-gray-200 p-6';
    rightEl.innerHTML = '<p class="text-xs text-gray-400">Overdue panel loading...</p>';

    el.appendChild(leftEl);
    el.appendChild(rightEl);

    // Render donut chart and replace overdue slot after DOM insert
    requestAnimationFrame(() => {
      const ctx = document.getElementById('donutChart');
      if (ctx) {
        new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: Object.keys(counts),
            datasets: [{ data: Object.values(counts), backgroundColor: Object.values(statusColors), borderWidth: 2, borderColor: '#fff' }]
          },
          options: { plugins: { legend: { display: false } }, cutout: '65%' }
        });
      }
      const slot = document.getElementById('overdue-panel-slot');
      if (slot) slot.replaceWith(renderOverduePanel());
    });

    return el;
  }

  function renderOverduePanel() {
    const overdueTasks = DATA.tasks.filter(t => t.is_overdue);
    const total = DATA.summary.total;
    const showReco = (overdueTasks.length / total) > 0.05;

    const buckets = { '0\u20132d': 0, '3\u20137d': 0, '8\u201314d': 0, '15+d': 0 };
    overdueTasks.forEach(t => {
      if (t.days_open <= 2) buckets['0\u20132d']++;
      else if (t.days_open <= 7) buckets['3\u20137d']++;
      else if (t.days_open <= 14) buckets['8\u201314d']++;
      else buckets['15+d']++;
    });

    const byOwner = {};
    overdueTasks.forEach(t => { byOwner[t.assignee] = (byOwner[t.assignee] || 0) + 1; });

    const byStatus = {};
    overdueTasks.forEach(t => { byStatus[t.status] = (byStatus[t.status] || 0) + 1; });

    const top3 = [...overdueTasks].sort((a, b) => b.days_open - a.days_open).slice(0, 3);

    const el = document.createElement('div');
    el.className = 'md:col-span-1 bg-white rounded-xl border border-gray-200 p-6 space-y-4';
    el.innerHTML = `
      <h2 class="text-base font-semibold text-gray-900">Overdue Risk</h2>
      <div class="text-3xl font-bold text-red-600">${overdueTasks.length}
        <span class="text-sm font-normal text-gray-400">overdue tasks</span></div>

      <div>
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Age Buckets</p>
        ${Object.entries(buckets).map(([label, count]) => `
          <div class="flex justify-between text-sm py-1 border-b border-gray-50">
            <span class="text-gray-600">${label}</span>
            <span class="font-semibold text-gray-800">${count}</span>
          </div>`).join('')}
      </div>

      <div>
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">By Owner</p>
        ${Object.entries(byOwner).map(([owner, count]) => `
          <div class="flex justify-between text-sm py-1 border-b border-gray-50">
            <span class="text-gray-600">${owner}</span>
            <span class="font-semibold text-red-500">${count}</span>
          </div>`).join('')}
      </div>

      <div>
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">By Status</p>
        ${Object.entries(byStatus).map(([status, count]) => `
          <div class="flex justify-between text-sm py-1 border-b border-gray-50">
            <span class="status-pill ${statusPillClass(status)}">${status}</span>
            <span class="font-semibold text-gray-800">${count}</span>
          </div>`).join('')}
      </div>

      <div>
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Oldest Overdue</p>
        ${top3.map(t => `
          <div class="py-1 border-b border-gray-50">
            <p class="text-sm text-gray-800 truncate font-medium">${t.name}</p>
            <p class="text-xs text-red-500">${t.days_open} days open</p>
          </div>`).join('')}
      </div>

      ${showReco ? `<div class="reco-panel">&#128161; <strong>Process opportunity:</strong> Some tasks have crossed the expected turnaround window. Reviewing SLA estimates or introducing early reminders may help reduce future overruns.</div>` : ''}
    `;
    return el;
  }

  function renderHeader() {
    const el = document.createElement('div');
    const refreshed = new Date(DATA.generated_at).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
    el.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-200 p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h1 class="text-2xl font-bold text-gray-900">Rebate Tracker Executive Dashboard</h1>
          <p class="text-sm text-gray-500 mt-1">Operational status and turnaround overview for rebate workflow</p>
        </div>
        <div class="flex items-center gap-4 text-sm text-gray-500">
          <span>Last refreshed: <span class="font-medium text-gray-700">${refreshed}</span></span>
          <a href="${DATA.clickup_url}" target="_blank"
             class="inline-flex items-center gap-1 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
            &#8599; Open in ClickUp
          </a>
        </div>
      </div>`;
    return el;
  }

  function renderKPIStrip() {
    const s = DATA.summary;
    const cards = [
      { label: 'Total Tasks',        value: s.total,                  note: 'all tasks on board',                          color: 'text-gray-900' },
      { label: 'Open Tasks',         value: s.open,                   note: `${s.todo} to do · ${s.in_progress} in progress`, color: 'text-blue-600' },
      { label: 'Completed',          value: s.done,                   note: s.done === 0 ? 'none closed yet' : 'tasks closed', color: 'text-green-600' },
      { label: 'Overdue',            value: s.overdue,                note: 'past due date',                               color: 'text-red-600' },
      { label: 'In Progress',        value: s.in_progress,            note: 'currently in execution',                      color: 'text-blue-600' },
      { label: 'Approval & Invoice', value: s.approval_invoice,       note: 'awaiting approval',                           color: 'text-amber-600' },
      { label: 'Max Time Taken',     value: `${s.max_time_taken_days}d`, note: 'longest running task',                     color: 'text-gray-700' },
      { label: 'Avg Resolution',     value: s.avg_resolution_days !== null ? `${s.avg_resolution_days}d` : '—',
                                     note: 'created → done',                                                               color: 'text-gray-700' },
    ];
    const el = document.createElement('div');
    el.className = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4';
    el.innerHTML = cards.map(c => `
      <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-1">
        <span class="text-xs text-gray-500 font-medium uppercase tracking-wide">${c.label}</span>
        <span class="text-2xl font-bold ${c.color}">${c.value}</span>
        <span class="text-xs text-gray-400">${c.note}</span>
      </div>`).join('');
    return el;
  }
</script>
</body>
</html>
