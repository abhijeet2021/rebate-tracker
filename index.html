<script>
  // Main render — called after DATA is defined
  let activeTab = 'summary';

  document.addEventListener('DOMContentLoaded', () => renderDashboard());

  function renderDashboard() {
    const app = document.getElementById('app');
    app.innerHTML = '';
    app.appendChild(renderHeader());
    app.appendChild(renderTabBar());
    if (activeTab === 'summary') {
      app.appendChild(renderExecSummary());
    } else {
      app.appendChild(renderKPIStrip());
      app.appendChild(renderProductivitySection());
      app.appendChild(renderStatusAndOverdueSection());
      app.appendChild(renderLongestAndBottleneck());
      app.appendChild(renderThroughputSection());
      app.appendChild(renderDetailTable());
    }
  }

  function renderTabBar() {
    const el = document.createElement('div');
    el.className = 'bg-white border border-gray-200 rounded-xl p-1.5 flex gap-1';
    const tabs = [
      { id: 'summary', label: 'Executive Summary' },
      { id: 'ops', label: 'Operational Dashboard' },
    ];
    el.innerHTML = tabs.map(t => `
      <button data-tab="${t.id}"
        class="flex-1 py-2.5 rounded-lg text-sm font-medium transition-colors
          ${activeTab === t.id ? 'bg-gray-900 text-white' : 'text-gray-500 hover:text-gray-800'}">
        ${t.label}
      </button>`).join('');
    el.addEventListener('click', e => {
      const btn = e.target.closest('[data-tab]');
      if (!btn || btn.dataset.tab === activeTab) return;
      activeTab = btn.dataset.tab;
      renderDashboard();
    });
    return el;
  }

  function renderExecSummary() {
    const s = DATA.summary;
    const completionPct = Math.round((s.done / s.total) * 100);

    // Owner open task counts
    const ownerCounts = {};
    DATA.tasks.filter(t => t.status.toLowerCase() !== 'done').forEach(t => {
      ownerCounts[t.assignee] = (ownerCounts[t.assignee] || 0) + 1;
    });
    const topOwners = Object.entries(ownerCounts).sort((a, b) => b[1] - a[1]).slice(0, 3);

    // Impact levels
    const impacts = [];
    if (s.approval_invoice > 0) impacts.push({
      level: 'HIGH', color: '#92400E', bg: '#FFFBEB', border: '#FDE68A',
      title: `Approval Bottleneck — ${s.approval_invoice} tasks`,
      body: `${s.approval_invoice} tasks stuck in sign-off with ${s.total_approval_wait_days} days accumulated wait. Each additional day delays cash flow recognition and vendor settlement.`
    });
    if (s.overdue > 0) impacts.push({
      level: 'MEDIUM', color: '#991B1B', bg: '#FFF1F2', border: '#FECDD3',
      title: `${s.overdue} Overdue Tasks`,
      body: `Overdue items risk SLA breach and may block quarterly reconciliation close.`
    });
    impacts.push({
      level: 'POSITIVE', color: '#166534', bg: '#F0FDF4', border: '#BBF7D0',
      title: `${completionPct}% Completion Rate`,
      body: `Strong execution throughput. Team velocity is healthy; bottleneck is approval capacity, not output.`
    });

    // Recommendations (auto-generated from data)
    const recos = [];
    if (s.approval_invoice > 0) recos.push({
      n: 1, bg: '#FEF3C7',
      title: 'Prioritise approval queue clearance',
      body: `Schedule a dedicated approvals review this week. Target: clear ${s.approval_invoice} pending tasks within 3 days.`
    });
    if (s.overdue > 0) recos.push({
      n: 2, bg: '#FEE2E2',
      title: `Resolve ${s.overdue} overdue items today`,
      body: 'Assign immediate owner accountability. Escalate any blocked by external dependency.'
    });
    recos.push({
      n: recos.length + 1, bg: '#DBEAFE',
      title: 'Introduce SLA thresholds per stage',
      body: 'Define max age per stage (e.g. 5d in Approval & Invoice). Auto-flag when exceeded to prevent silent buildup.'
    });

    const suggestions = [
      { icon: '💡', title: 'Batch approvals weekly', body: 'Group approval tasks into a fixed weekly slot to reduce context switching for approvers.' },
      { icon: '📊', title: 'Track approval turnaround by approver', body: 'Surface who is the bottleneck — person, team, or process — with per-approver aging data.' },
      { icon: '🔄', title: 'Auto-refresh dashboard daily', body: 'Schedule fetch_clickup.py via Task Scheduler so leadership always sees same-day data.' },
    ];

    const wrap = document.createElement('div');
    wrap.className = 'space-y-6';

    // Hero KPIs
    const heroEl = document.createElement('div');
    heroEl.className = 'grid grid-cols-2 md:grid-cols-4 gap-4';
    heroEl.innerHTML = [
      { label: 'Completion Rate', value: `${completionPct}%`, sub: `${s.done} of ${s.total} tasks done`, bar: completionPct, barColor: '#059669', badgeBg: '', badgeText: '', color: '#059669' },
      { label: 'Approval Backlog', value: s.approval_invoice, sub: 'tasks waiting for sign-off', bar: null, badgeBg: '#FEF3C7', badgeColor: '#92400E', badge: `${s.total_approval_wait_days}d accumulated wait`, color: '#D97706' },
      { label: 'Overdue Tasks', value: s.overdue, sub: 'need immediate attention', bar: null, badgeBg: '#FEE2E2', badgeColor: '#991B1B', badge: `${Math.round(s.overdue/s.total*100)}% of total tasks`, color: '#DC2626' },
      { label: 'Avg Resolution', value: s.avg_resolution_days !== null ? `${s.avg_resolution_days}d` : '—', sub: 'created → done', bar: null, badgeBg: '#DBEAFE', badgeColor: '#1E40AF', badge: 'execution pace', color: '#2563EB' },
    ].map(c => `
      <div class="bg-white border border-gray-200 rounded-xl p-5">
        <div class="text-xs text-gray-500 uppercase tracking-wide font-semibold mb-2">${c.label}</div>
        <div class="text-4xl font-bold mb-1" style="color:${c.color}">${c.value}</div>
        <div class="text-xs text-gray-500">${c.sub}</div>
        ${c.bar !== null ? `<div class="mt-3 h-1.5 bg-gray-100 rounded-full"><div class="h-full rounded-full" style="width:${c.bar}%;background:${c.barColor}"></div></div>` : ''}
        ${c.badge ? `<div class="mt-3 text-xs inline-block px-2.5 py-1 rounded-full font-medium" style="background:${c.badgeBg};color:${c.badgeColor}">${c.badge}</div>` : ''}
      </div>`).join('');
    wrap.appendChild(heroEl);

    // Progress + Impact
    const midEl = document.createElement('div');
    midEl.className = 'grid grid-cols-1 md:grid-cols-5 gap-4';
    midEl.innerHTML = `
      <div class="md:col-span-3 bg-white border border-gray-200 rounded-xl p-6 space-y-4">
        <h2 class="text-base font-semibold text-gray-900">Progress Overview</h2>
        ${[
          { label: 'Overall Completion', pct: completionPct, count: `${s.done}/${s.total}`, color: '#059669' },
          { label: 'In Progress', pct: Math.round(s.in_progress/s.total*100), count: s.in_progress, color: '#2563EB' },
          { label: 'Approval Queue', pct: Math.round(s.approval_invoice/s.total*100), count: s.approval_invoice, color: '#D97706' },
          { label: 'To Do', pct: Math.round(s.todo/s.total*100), count: s.todo, color: '#9CA3AF' },
        ].map(r => `
          <div class="flex items-center gap-3">
            <div class="w-36 text-sm text-gray-600 flex-shrink-0">${r.label}</div>
            <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
              <div class="h-full rounded-full" style="width:${r.pct}%;background:${r.color}"></div>
            </div>
            <div class="w-10 text-right text-sm font-semibold text-gray-700">${r.count}</div>
          </div>`).join('')}
        <div class="pt-4 border-t border-gray-100">
          <p class="text-xs text-gray-500 mb-3">Open workload by owner</p>
          <div class="flex gap-3">
            ${topOwners.map(([owner, count]) => `
              <div class="bg-gray-50 rounded-lg px-4 py-2 text-center border border-gray-100">
                <div class="text-lg font-bold text-gray-900">${count}</div>
                <div class="text-xs text-gray-500">${owner}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="md:col-span-2 bg-white border border-gray-200 rounded-xl p-6 space-y-3">
        <h2 class="text-base font-semibold text-gray-900">Business Impact</h2>
        ${impacts.map(i => `
          <div class="rounded-xl p-4" style="background:${i.bg};border:1px solid ${i.border}">
            <div class="text-xs font-semibold mb-1" style="color:${i.color}">${i.level === 'HIGH' ? '🔴' : i.level === 'MEDIUM' ? '🟠' : '🟢'} ${i.level} — ${i.title}</div>
            <div class="text-sm text-gray-700">${i.body}</div>
          </div>`).join('')}
      </div>`;
    wrap.appendChild(midEl);

    // Recommendations + Suggestions
    const botEl = document.createElement('div');
    botEl.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
    botEl.innerHTML = `
      <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
        <h2 class="text-base font-semibold text-gray-900">Recommendations</h2>
        ${recos.map(r => `
          <div class="flex gap-3">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 text-sm font-bold text-gray-700" style="background:${r.bg}">${r.n}</div>
            <div>
              <div class="text-sm font-semibold text-gray-900">${r.title}</div>
              <div class="text-xs text-gray-500 mt-1">${r.body}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="bg-white border border-gray-200 rounded-xl p-6 space-y-4">
        <h2 class="text-base font-semibold text-gray-900">Suggestions for Next Quarter</h2>
        ${suggestions.map((s, i) => `
          <div class="flex gap-3 ${i < suggestions.length-1 ? 'pb-4 border-b border-gray-100' : ''}">
            <span class="text-lg flex-shrink-0">${s.icon}</span>
            <div>
              <div class="text-sm font-semibold text-gray-900">${s.title}</div>
              <div class="text-xs text-gray-500 mt-1">${s.body}</div>
            </div>
          </div>`).join('')}
      </div>`;
    wrap.appendChild(botEl);

    return wrap;
  }

  function renderProductivitySection() {
    const s = DATA.summary;
    const showReco = s.avg_approval_wait_days > 5;
    const completedPct = Math.round((s.done / s.total) * 100);
    const approvalPct = Math.round((s.approval_invoice / s.total) * 100);
    const openOtherPct = 100 - completedPct - approvalPct;

    const el = document.createElement('div');
    el.className = 'bg-white rounded-xl border border-gray-200 p-6 space-y-4';
    el.innerHTML = `
      <div>
        <h2 class="text-base font-semibold text-gray-900">Productivity vs. Approval Lag</h2>
        <p class="text-xs text-gray-500 mt-0.5">Work completed vs. time consumed waiting for approvals</p>

  function getStatusCounts() {
    const counts = { 'to do': 0, 'in progress': 0, 'approval & invoice': 0, 'done': 0 };
    DATA.tasks.forEach(t => { const k = t.status.toLowerCase(); if (counts[k] !== undefined) counts[k]++; });
    return counts;
  }

  function getStatusAvgAge() {
    const groups = {};
    DATA.tasks.forEach(t => {
      if (!groups[t.status]) groups[t.status] = [];
      groups[t.status].push(t.days_open);
    });
    const result = {};
    for (const [s, ages] of Object.entries(groups)) {
      result[s] = Math.round(ages.reduce((a, b) => a + b, 0) / ages.length);
    }
    return result;
  }

  function statusPillClass(status) {
    const map = { 'to do': 'pill-todo', 'in progress': 'pill-inprogress', 'approval & invoice': 'pill-approval', 'done': 'pill-done' };
    return map[status.toLowerCase()] || 'pill-todo';
  }

  function renderOverduePanel() {

    const byOwner = {};

  function renderLongestAndBottleneck() {
    const s = DATA.summary;

    const top5 = [...tasks].sort((a, b) => b.days_open - a.days_open).slice(0, 5);
    const longestTask = top5[0];

    const statusAvg = getStatusAvgAge();
    const overallAvgAge = Math.round(openTasks.reduce((sum, t) => sum + t.days_open, 0) / openTasks.length);

    const ownerBacklog = {};
    openTasks.forEach(t => { ownerBacklog[t.assignee] = (ownerBacklog[t.assignee] || 0) + 1; });
    const topOwners = Object.entries(ownerBacklog).sort((a, b) => b[1] - a[1]).slice(0, 3);

    const openByStatus = {};
    openTasks.forEach(t => { openByStatus[t.status] = (openByStatus[t.status] || 0) + 1; });

    const statusColorMap = { 'to do': '#9CA3AF', 'in progress': '#2563EB', 'approval & invoice': '#D97706', 'done': '#059669' };

    const recos = [];
    for (const [status, count] of Object.entries(openByStatus)) {
      if (count / openTasks.length > 0.35) {
        recos.push(`&#128161; <strong>Queue pressure detected</strong> \u2014 ${status} stage holds ${Math.round(count / openTasks.length * 100)}% of open tasks. Consider batch approvals or assigning a secondary reviewer.`);
      }
      if (statusAvg[status] && statusAvg[status] > 2 * overallAvgAge) {
        recos.push(`&#128161; <strong>Workflow improvement suggestion</strong> \u2014 ${status} stage aging (${statusAvg[status]}d avg) is elevated vs overall avg (${overallAvgAge}d).`);
      }
    }
    if (s.todo > 0 && s.open > 0 && s.todo / s.open > 0.40) {
      recos.push(`&#128161; <strong>Queue pressure detected</strong> \u2014 Large To Do backlog suggests intake is faster than execution capacity. Prioritize queue grooming.`);
    }

    const el = document.createElement('div');
    el.className = 'grid grid-cols-1 md:grid-cols-2 gap-6';
    el.innerHTML = `
      <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-4">

              </tr>

            <tbody>
              ${top5.map(t => `

                  <td class="py-2 pr-2"><a href="${t.task_url}" target="_blank" class="text-blue-600 hover:underline truncate block max-w-xs">${t.name}</a><p class="text-xs text-gray-400">${t.assignee}</p></td>

                  <td class="py-2 text-right font-semibold text-gray-700">${t.days_open}d</td>

        ${recos.length > 0 ? recos.map(r => `<div class="reco-panel">${r}</div>`).join('') : ''}

    return el;

  function getISOWeek(dateStr) {
    const d = new Date(dateStr);
    const dayOfWeek = d.getDay() || 7;
    d.setDate(d.getDate() + 4 - dayOfWeek);
    const yearStart = new Date(d.getFullYear(), 0, 1);
    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return `${d.getFullYear()}-W${String(weekNo).padStart(2, '00')}`;
  }

  function renderThroughputSection() {
    const created = {}, closed = {};
    DATA.tasks.forEach(t => {
      const wk = getISOWeek(t.created_at);
      created[wk] = (created[wk] || 0) + 1;
      if (t.date_closed) {
        const cwk = getISOWeek(t.date_closed);
        closed[cwk] = (closed[cwk] || 0) + 1;
      }
    });

    const allWeeks = [...new Set([...Object.keys(created), ...Object.keys(closed)])].sort();

    const el = document.createElement('div');
    el.className = 'bg-white rounded-xl border border-gray-200 p-6 space-y-4';

    if (allWeeks.length < 2) {
      el.innerHTML = `
        <h2 class="text-base font-semibold text-gray-900">Throughput Trends</h2>
        <div class="rounded-xl bg-gray-50 border border-gray-200 p-8 text-center text-gray-400 text-sm">

        </div>`;
      return el;
    }

    el.innerHTML = `
      <h2 class="text-base font-semibold text-gray-900">Throughput Trends</h2>
      <p class="text-xs text-gray-500">Tasks created vs. completed per week</p>
      <div class="relative h-56"><canvas id="throughputChart"></canvas></div>`;

    requestAnimationFrame(() => {
      const ctx = document.getElementById('throughputChart');
      if (!ctx) return;
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: allWeeks,
          datasets: [
            { label: 'Created',   data: allWeeks.map(w => created[w] || 0), backgroundColor: '#BFDBFE', borderRadius: 4 },
            { label: 'Completed', data: allWeeks.map(w => closed[w] || 0),  backgroundColor: '#6EE7B7', borderRadius: 4 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { font: { family: 'Inter', size: 11 } } } },
          scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: '#F3F4F6' } } }

      });
    });

    return el;
  }

      { label: 'In Progress',        value: s.in_progress,            note: 'currently in execution',                      color: 'text-blue-600' },
      { label: 'Approval & Invoice', value: s.approval_invoice,       note: 'awaiting approval',                           color: 'text-amber-600' },
      { label: 'Max Time Taken',     value: `${s.max_time_taken_days}d`, note: 'longest running task',                     color: 'text-gray-700' },
      { label: 'Avg Resolution',     value: s.avg_resolution_days !== null ? `${s.avg_resolution_days}d` : '—',
                                     note: 'created → done',                                                               color: 'text-gray-700' },
    ];
    const el = document.createElement('div');
    el.className = 'grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4';
    el.innerHTML = cards.map(c => `
      <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col gap-1">
        <span class="text-xs text-gray-500 font-medium uppercase tracking-wide">${c.label}</span>
        <span class="text-2xl font-bold ${c.color}">${c.value}</span>
        <span class="text-xs text-gray-400">${c.note}</span>
      </div>`).join('');
    return el;
  }
</script>
</body>
</html>
