  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F7F8FA; color: #111827; }

    .pill-inprogress { background: #DBEAFE; color: #2563EB; }

    .pill-done { background: #D1FAE5; color: #059669; }
    .pill-overdue { background: #FEE2E2; color: #DC2626; }
    .reco-panel { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 0.75rem; padding: 12px 16px; margin-top: 12px; font-size: 0.8rem; color: #374151; }
